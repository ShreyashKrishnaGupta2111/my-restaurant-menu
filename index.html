<!DOCTYPE html>
<html>
<head>
  <title>My Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍽️ Delicious Bites</h1>

<div class="menu">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601924582975-7e6b4e8b7d9b" alt="Pizza">
    <h3>Pizza</h3>
    <p>₹200</p>
    <button onclick="addToCart('Pizza')">Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
    <h3>Burger</h3>
    <p>₹120</p>
    <button onclick="addToCart('Burger')">Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908812345-46e6e0c5d68c" alt="Pasta">
    <h3>Pasta</h3>
    <p>₹180</p>
    <button onclick="addToCart('Pasta')">Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" alt="Sandwich">
    <h3>Sandwich</h3>
    <p>₹90</p>
    <button onclick="addToCart('Sandwich')">Order</button>
  </div>

</div>

<h2>🛒 Cart</h2>
<ul id="cart"></ul>

<a id="orderBtn" target="_blank" class="order-btn">Place Order via WhatsApp</a>

<script src="script.js"></script>

</body>
</html>
