<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Menu with Cart</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
}

header {
    background: #ff5733;
    color: white;
    padding: 15px;
    text-align: center;
}

/* CART */
.cart {
    position: fixed;
    top: 10px;
    right: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

.menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    width: 250px;
    margin: 15px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.price {
    color: green;
    font-weight: bold;
}

button {
    margin: 10px;
    padding: 10px;
    border: none;
    background: #ff5733;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

#cart-items {
    font-size: 14px;
}
</style>

</head>

<body>

<header>
    <h1>🍴 My Restaurant</h1>
</header>

<div class="cart">
    🛒 Items: <span id="count">0</span>
    <div id="cart-items"></div>
</div>

<div class="menu">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601924582975-7c6d7b6d8b5b" alt="Pizza">
        <h3>Pizza</h3>
        <p class="price">₹199</p>
        <button onclick="addToCart('Pizza')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b" alt="Pasta">
        <h3>Pasta</h3>
        <p class="price">₹149</p>
        <button onclick="addToCart('Pasta')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1553909489-cd47e0907980" alt="Sandwich">
        <h3>Sandwich</h3>
        <p class="price">₹99</p>
        <button onclick="addToCart('Sandwich')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
        <h3>Burger</h3>
        <p class="price">₹129</p>
        <button onclick="addToCart('Burger')">Add to Cart</button>
    </div>

</div>

<script>
let cart = [];

function addToCart(item) {
    cart.push(item);

    // update count
    document.getElementById("count").innerText = cart.length;

    // show items
    document.getElementById("cart-items").innerHTML = cart.join("<br>");
}
</script>

</body>
</html>
