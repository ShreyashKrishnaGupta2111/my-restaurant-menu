<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Menu</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to right, #ffecd2, #fcb69f);
}

header {
    text-align: center;
    padding: 20px;
    background: #ff5733;
    color: white;
}

.menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    width: 250px;
    margin: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover; /* FIXES SIZE ISSUE */
}

.card h3 {
    margin: 10px 0 5px;
}

.price {
    color: green;
    font-weight: bold;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    margin-bottom: 15px;
    border: none;
    background: #ff5733;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #e64a19;
}
</style>

</head>
<body>

<header>
    <h1>🍴 My Online Restaurant</h1>
    <p>Select your favorite food & order!</p>
</header>

<div class="menu">

    <div class="card">
        <img src="images/pizza.jpg" alt="Pizza">
        <h3>Pizza</h3>
        <p class="price">₹199</p>
        <button onclick="orderFood('Pizza')">Order Now</button>
    </div>

    <div class="card">
        <img src="images/pasta.jpg" alt="Pasta">
        <h3>Pasta</h3>
        <p class="price">₹149</p>
        <button onclick="orderFood('Pasta')">Order Now</button>
    </div>

    <div class="card">
        <img src="images/sandwich.jpg" alt="Sandwich">
        <h3>Sandwich</h3>
        <p class="price">₹99</p>
        <button onclick="orderFood('Sandwich')">Order Now</button>
    </div>

    <div class="card">
        <img src="images/burger.jpg" alt="Burger">
        <h3>Burger</h3>
        <p class="price">₹129</p>
        <button onclick="orderFood('Burger')">Order Now</button>
    </div>

</div>

<script>
function orderFood(item) {
    alert(item + " ordered successfully!");
}
</script>

</body>
</html>
