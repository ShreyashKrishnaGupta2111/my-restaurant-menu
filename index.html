<!DOCTYPE html>
<html>
<head>
  <title>My Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍽️ Delicious Bites</h1>

<div class="menu">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1594007654729-407eedc4fe0f" alt="Pizza">
    <h3>Pizza</h3>
    <p>₹200</p>
    <button onclick="addToCart('Pizza',200)">Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
    <h3>Burger</h3>
    <p>₹120</p>
    <button onclick="addToCart('Burger',120)">Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1603133872878-684f208fb84b" alt="Pasta">
    <h3>Pasta</h3>
    <p>₹180</p>
    <button onclick="addToCart('Pasta',180)">Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1528735602780-2552fd46c7af" alt="Sandwich">
    <h3>Sandwich</h3>
    <p>₹90</p>
    <button onclick="addToCart('Sandwich',90)">Order</button>
  </div>

</div>

<h2>🛒 Cart</h2>
<ul id="cart"></ul>

<h3 id="total">Total: ₹0</h3>

<a id="orderBtn" class="order-btn" target="_blank">Place Order on WhatsApp</a>

<script src="script.js"></script>
</body>
</html>
